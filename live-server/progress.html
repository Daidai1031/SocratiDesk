<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SocratiDesk — My Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f5;--card:#fff;--text:#1a1612;--sub:#7a7064;
  --accent:#1d6b52;--accent-light:#e8f5ee;
  --warm:#f59e0b;--warm-light:#fef3c7;
  --blue:#3b82f6;--blue-light:#dbeafe;
  --purple:#8b5cf6;--purple-light:#ede9fe;
  --rose:#e11d48;--rose-light:#ffe4e6;
  --border:#e8e4de;--radius:14px;
  --font:'Patrick Hand', system-ui, sans-serif;
  --display:'Cabin Sketch', cursive;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);color:var(--text);background:var(--bg);
  min-height:100dvh;padding-bottom:calc(80px + var(--safe-bottom));font-family:var(--font);line-height:1.6;
  -webkit-font-smoothing:antialiased}

/* ── Header ── */
.hdr{
  background:linear-gradient(145deg,#1d6b52,#145740);
  color:#fff;padding:calc(16px + var(--safe-top)) 20px 36px;
  position:relative;
}
.hdr::after{content:'';position:absolute;bottom:-16px;left:0;right:0;height:32px;
  background:var(--bg);border-radius:16px 16px 0 0}
.hdr-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.hdr-icon{width:36px;height:36px;border-radius:9px;overflow:hidden;
  display:flex;align-items:center;justify-content:center}
.hdr h1{font-family:var(--display);font-size:1.2rem;font-weight:600}
/* 4 stats in one row */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.st{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 4px;text-align:center;
  backdrop-filter:blur(6px)}
.st-v{font-size:1.2rem;font-weight:700;line-height:1.2}
.st-l{font-size:.6rem;opacity:.75;margin-top:1px;text-transform:uppercase;letter-spacing:.05em}

/* ── Tabs ── */
.tabs{display:flex;gap:0;padding:0 16px;margin-top:-6px;position:relative;z-index:2}
.tab{flex:1;padding:9px 0;text-align:center;border:none;cursor:pointer;
  font-family:var(--font);font-size:.8rem;font-weight:600;
  background:transparent;color:var(--sub);border-bottom:2px solid transparent;
  transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Content ── */
.wrap{padding:12px 16px}
.sec{display:none}.sec.active{display:block}

/* ── Feedback (Summary tab) ── */
.fb{background:linear-gradient(135deg,var(--accent-light),#f0fdf4);
  border-radius:var(--radius);padding:18px;margin-bottom:14px;
  border:1px solid #c6f0d4;position:relative}
.fb::before{content:'🌟';position:absolute;top:10px;right:14px;font-size:1.8rem;opacity:.25}
.fb-title{font-family:var(--display);font-size:1.05rem;font-weight:600;color:var(--accent);margin-bottom:6px}
.fb-text{font-size:.875rem;line-height:1.65;color:#1a3a2a}
.fb-text strong{color:var(--accent);font-weight:600}
.fb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.fb-tag{font-size:.65rem;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.02em}
.fb-tag.bio{background:#dcfce7;color:#166534}
.fb-tag.chem{background:#dbeafe;color:#1e40af}
.fb-tag.phys{background:#ede9fe;color:#5b21b6}
.fb-tag.math{background:#fef3c7;color:#92400e}
.fb-tag.geo{background:#ffedd5;color:#9a3412}
.fb-tag.gen{background:#f0ede8;color:var(--sub)}
.fb-meta{margin-top:10px;font-size:.7rem;color:var(--accent);opacity:.65}

/* ── Knowledge Cards ── */
.kcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.kcard-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.kcard-icon{width:28px;height:28px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.8rem}
.kcard-icon.textbook{background:#dbeafe}
.kcard-icon.curiosity{background:#fef3c7}
.kcard-topic{font-weight:700;font-size:.9rem;flex:1;text-transform:capitalize}
.kcard-mode{font-size:.6rem;padding:2px 7px;border-radius:12px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.kcard-mode.textbook{background:#dbeafe;color:#2563eb}
.kcard-mode.curiosity{background:#fef3c7;color:#d97706}
.kcard-body{font-size:.84rem;line-height:1.6;color:#3d3630}
.kcard-body ul{margin:4px 0 4px 18px;padding:0}
.kcard-body li{margin-bottom:3px}
.kcard-body strong{color:var(--text);font-weight:600}
.kcard-pages{margin-top:8px;font-size:.7rem;color:var(--sub);display:flex;align-items:center;gap:4px}
.kcard-pages svg{width:13px;height:13px;stroke:var(--sub);fill:none;stroke-width:2}

/* ── Timeline ── */
.tl{position:relative;padding-left:22px}
.tl::before{content:'';position:absolute;left:6px;top:6px;bottom:6px;width:2px;
  background:linear-gradient(var(--accent),var(--border));border-radius:1px}
.tl-item{position:relative;margin-bottom:14px}
.tl-dot{position:absolute;left:-19px;top:5px;width:9px;height:9px;
  border-radius:50%;border:2px solid var(--accent);background:var(--bg)}
.tl-dot.tutor{background:var(--accent)}
.tl-who{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.tl-who.student{color:var(--warm)}
.tl-who.tutor{color:var(--accent)}
.tl-txt{font-size:.82rem;line-height:1.5;color:var(--text)}
.tl-badge{display:inline-block;font-size:.6rem;padding:1px 6px;border-radius:4px;
  background:#f0ede8;color:var(--sub);margin-left:4px;font-weight:500}

/* ── States ── */
.loading{text-align:center;padding:36px 20px;color:var(--sub)}
.spinner{width:28px;height:28px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px}
.empty-icon{font-size:2.5rem;margin-bottom:10px}
.empty-t{font-family:var(--display);font-size:1rem;font-weight:600;margin-bottom:3px}
.empty-s{font-size:.84rem;color:var(--sub);line-height:1.4}

/* ── Refresh ── */
.rfr{position:fixed;bottom:calc(16px + var(--safe-bottom));right:16px;
  width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
  background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(29,107,82,.3);z-index:10;transition:transform .15s}
.rfr:active{transform:scale(.9)}
.rfr svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.kcard,.fb,.tl-item{animation:fadeUp .35s ease both}
.kcard:nth-child(2){animation-delay:.04s}
.kcard:nth-child(3){animation-delay:.08s}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div class="hdr-icon"><img src="/logo.png" alt="" style="width:36px;height:36px;border-radius:9px;object-fit:cover;"></div>
    <h1>My Learning</h1>
  </div>
  <div class="stats" id="stats">
    <div class="st"><div class="st-v" id="sTopics">–</div><div class="st-l">Topics</div></div>
    <div class="st"><div class="st-v" id="sTurns">–</div><div class="st-l">Turns</div></div>
    <div class="st"><div class="st-v" id="sTime">–</div><div class="st-l">Min</div></div>
    <div class="st"><div class="st-v" id="sMode">–</div><div class="st-l">Mode</div></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="sw('summary')">Summary</button>
  <button class="tab" onclick="sw('knowledge')">Knowledge</button>
  <button class="tab" onclick="sw('history')">History</button>
</div>

<div class="wrap">
  <div class="sec active" id="tab-summary"><div class="loading"><div class="spinner"></div>Loading summary...</div></div>
  <div class="sec" id="tab-knowledge"><div class="loading"><div class="spinner"></div>Loading knowledge...</div></div>
  <div class="sec" id="tab-history"><div class="loading"><div class="spinner"></div>Loading history...</div></div>
</div>

<button class="rfr" onclick="load()" title="Refresh">
  <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
</button>

<script>
const SID=new URLSearchParams(location.search).get('session')||new URLSearchParams(location.search).get('device_id')||'default';
const API=location.origin;

function sw(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.textContent.toLowerCase()===id));
  document.querySelectorAll('.sec').forEach(s=>s.classList.toggle('active',s.id==='tab-'+id));
}

async function load(){
  try{
    const r=await fetch(`${API}/progress-data?device_id=${SID}`);
    const d=await r.json();
    rStats(d);rFB(d);rK(d);rH(d);
  }catch(e){
    document.getElementById('tab-summary').innerHTML='<div class="empty"><div class="empty-icon">📡</div><div class="empty-t">Connection error</div><div class="empty-s">Make sure SocratiDesk is running</div></div>';
  }
}

function rStats(d){
  const s=d.stats||{};
  document.getElementById('sTopics').textContent=s.topics_studied||0;
  document.getElementById('sTurns').textContent=s.total_turns||0;
  document.getElementById('sTime').textContent=s.duration_minutes||0;
  document.getElementById('sMode').textContent=(s.mode||'—').replace('curiosity','🔍').replace('textbook','📖').replace(' & ','');
}

const TAG_MAP={
  bio:['mammal','animal','cell','organ','plant','dna','gene','species','ecosystem','photosynthesis','evolution','bacteria','virus','protein','enzyme','biology','life','living','blood','heart','brain','muscle','bone','respiratory','digestive','immune','nervous'],
  chem:['ph','acid','base','atom','molecule','element','reaction','chemical','compound','ion','bond','periodic','solution','concentration','oxidation','electron','proton','neutron','chemistry','formula','mole','gas','liquid','solid'],
  phys:['force','energy','gravity','motion','velocity','acceleration','momentum','wave','light','sound','electric','magnetic','circuit','voltage','current','resistance','physics','newton','mass','weight','pressure','temperature','heat','thermodynamic','quantum','frequency'],
  math:['equation','number','algebra','geometry','calculus','function','graph','angle','triangle','circle','area','volume','fraction','decimal','probability','statistics','math','formula','theorem','proof','matrix','vector','integral','derivative'],
  geo:['earth','rock','mineral','volcano','earthquake','plate','tectonic','ocean','climate','weather','atmosphere','erosion','fossil','continent','geography','soil','water cycle','glacier']
};

function detectSubject(topic){
  const t=(topic||'').toLowerCase();
  for(const[subj,kws] of Object.entries(TAG_MAP)){
    if(kws.some(k=>t.includes(k))) return subj;
  }
  return 'gen';
}

const SUBJ_LABELS={bio:'Biology',chem:'Chemistry',phys:'Physics',math:'Math',geo:'Earth Science',gen:'General'};

function rFB(d){
  const el=document.getElementById('tab-summary');
  if(!d.feedback){
    el.innerHTML='<div class="empty"><div class="empty-icon">🎤</div><div class="empty-t">No sessions yet</div><div class="empty-s">Start a conversation with SocratiDesk to see your progress!</div></div>';
    return;
  }
  const topics=d.topics||[];
  const subjects=[...new Set(topics.map(t=>detectSubject(t.topic)))];
  const tags=subjects.map(s=>`<span class="fb-tag ${s}">${SUBJ_LABELS[s]}</span>`).join('');
  el.innerHTML=`<div class="fb">
    <div class="fb-title">${d.feedback.title||'Your Learning Journey'}</div>
    <div class="fb-text">${d.feedback.message||''}</div>
    ${tags?`<div class="fb-tags">${tags}</div>`:''}
    <div class="fb-meta">${d.feedback.meta||''}</div>
  </div>`;
}

function rK(d){
  const el=document.getElementById('tab-knowledge');
  const cards=d.knowledge||[];
  if(!cards.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📚</div><div class="empty-t">No knowledge yet</div><div class="empty-s">Complete a topic to see summaries</div></div>';
    return;
  }
  el.innerHTML=cards.map(k=>{
    const subj=detectSubject(k.topic);
    return `<div class="kcard">
      <div class="kcard-hdr">
        <div class="kcard-icon ${k.mode}">${k.mode==='textbook'?'📖':'💡'}</div>
        <div class="kcard-topic">${esc(k.topic)}</div>
        <span class="kcard-mode ${k.mode}">${k.mode}</span>
      </div>
      <div class="fb-tags" style="margin-bottom:8px"><span class="fb-tag ${subj}">${SUBJ_LABELS[subj]}</span></div>
      <div class="kcard-body">${k.summary}</div>
      ${k.pages?`<div class="kcard-pages"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> Pages ${k.pages}</div>`:''}
    </div>`;
  }).join('');
}

function rH(d){
  const el=document.getElementById('tab-history');
  const h=d.history||[];
  if(!h.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">💬</div><div class="empty-t">No history</div><div class="empty-s">Your conversation will appear here</div></div>';
    return;
  }
  el.innerHTML='<div class="tl">'+h.map(t=>{
    let out='';
    if(t.user&&t.user.trim()) out+=`<div class="tl-item"><div class="tl-dot"></div><div class="tl-who student">You<span class="tl-badge">${t.phase}·${t.stage}</span></div><div class="tl-txt">${esc(t.user)}</div></div>`;
    if(t.tutor&&t.tutor.trim()) out+=`<div class="tl-item"><div class="tl-dot tutor"></div><div class="tl-who tutor">SocratiDesk</div><div class="tl-txt">${esc(t.tutor)}</div></div>`;
    return out;
  }).join('')+'</div>';
}

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

let ws;
function connectWS(){
  const p=location.protocol==='https:'?'wss:':'ws:';
  try{
    ws=new WebSocket(`${p}//${location.host}/progress-ws?device_id=${SID}`);
    ws.onmessage=()=>load();
    ws.onclose=()=>setTimeout(connectWS,5000);
  }catch(e){}
}
load();connectWS();
</script>
</body>
</html>
